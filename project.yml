name: Trigger
options:
  bundleIdPrefix: com.trigger
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true

targets:
  Trigger:
    type: application
    platform: iOS
    sources:
      - path: Trigger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trigger.reminder
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Trigger/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Trigger uses your microphone to capture voice reminders instantly."
        NSSpeechRecognitionUsageDescription: "Trigger transcribes your voice to create reminders."
        UILaunchScreen:
          UIImageName: ""
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIBackgroundModes:
          - remote-notification
